openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Content Freshness Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pages
    description: Page freshness operations
  - name: settings
    description: Dashboard settings
  - name: sync
    description: Data sync operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /pages:
    get:
      operationId: getPages
      tags: [pages]
      summary: Get all pages with freshness data
      responses:
        "200":
          description: List of pages with freshness scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PageFreshness"
    post:
      operationId: createPage
      tags: [pages]
      summary: Add a page to track
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePageInput"
      responses:
        "201":
          description: Created page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageFreshness"
  /pages/upload-csv:
    post:
      operationId: uploadCsv
      tags: [pages]
      summary: Upload CSV to bulk import pages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CsvUploadInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvUploadResult"
  /pages/{id}:
    delete:
      operationId: deletePage
      tags: [pages]
      summary: Delete a tracked page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /pages/stats:
    get:
      operationId: getStats
      tags: [pages]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get dashboard settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    post:
      operationId: updateSettings
      tags: [settings]
      summary: Update dashboard settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
  /sync/sitemap:
    post:
      operationId: syncSitemap
      tags: [sync]
      summary: Crawl sitemap and sync pages
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
  /sync/gsc:
    post:
      operationId: syncGsc
      tags: [sync]
      summary: Pull data from Google Search Console API
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
  /sync/rescore-ai:
    post:
      operationId: rescoreAi
      tags: [sync]
      summary: Re-score AI citation likelihood for all pages
      responses:
        "200":
          description: Rescore result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
  /sync/status:
    get:
      operationId: getSyncStatus
      tags: [sync]
      summary: Get sync status
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    PageFreshness:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        title:
          type: string
        lastUpdated:
          type: string
          format: date-time
        clicks30d:
          type: integer
        clicksPrev30d:
          type: integer
        wordCount:
          type: integer
        excerpt:
          type: string
        freshnessScore:
          type: number
        decayScore:
          type: number
        triageStatus:
          type: string
          enum: [critical, review, healthy]
        aiCitationLikely:
          type: boolean
        aiCitationReason:
          type: string
        daysSinceUpdate:
          type: integer
        trafficTrend:
          type: string
          enum: [up, down, stable]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - url
        - lastUpdated
        - clicks30d
        - clicksPrev30d
        - wordCount
        - freshnessScore
        - decayScore
        - triageStatus
        - aiCitationLikely
        - daysSinceUpdate
        - trafficTrend
        - createdAt
    CreatePageInput:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        lastUpdated:
          type: string
          format: date-time
        clicks30d:
          type: integer
        clicksPrev30d:
          type: integer
        wordCount:
          type: integer
        excerpt:
          type: string
      required: [url, lastUpdated, clicks30d, clicksPrev30d, wordCount]
    CsvUploadInput:
      type: object
      properties:
        csvData:
          type: string
      required: [csvData]
    CsvUploadResult:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string
      required: [imported, skipped, errors]
    DashboardStats:
      type: object
      properties:
        totalPages:
          type: integer
        freshPercent:
          type: number
        criticalCount:
          type: integer
        reviewCount:
          type: integer
        healthyCount:
          type: integer
        avgFreshnessScore:
          type: number
        aiCitationReadyCount:
          type: integer
      required:
        - totalPages
        - freshPercent
        - criticalCount
        - reviewCount
        - healthyCount
        - avgFreshnessScore
        - aiCitationReadyCount
    Settings:
      type: object
      properties:
        sitemapUrl:
          type: string
        gscSiteUrl:
          type: string
        gscHasCredentials:
          type: boolean
          description: True if a service account JSON has been saved (does not expose the key itself)
        lastSitemapSync:
          type: string
          format: date-time
        lastGscSync:
          type: string
          format: date-time
        autoSyncEnabled:
          type: boolean
      required:
        - gscHasCredentials
        - autoSyncEnabled
    UpdateSettingsInput:
      type: object
      properties:
        sitemapUrl:
          type: string
        gscSiteUrl:
          type: string
        gscServiceAccountJson:
          type: string
          description: Full JSON string of the Google service account key file
        autoSyncEnabled:
          type: boolean
    SyncResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        upserted:
          type: integer
        updated:
          type: integer
        errors:
          type: array
          items:
            type: string
      required: [success, message, upserted, updated, errors]
    SyncStatus:
      type: object
      properties:
        lastSitemapSync:
          type: string
          format: date-time
        lastGscSync:
          type: string
          format: date-time
        sitemapConfigured:
          type: boolean
        gscConfigured:
          type: boolean
      required: [sitemapConfigured, gscConfigured]
